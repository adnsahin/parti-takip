<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parti Takip Sistemi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}

.header{background:rgba(31,78,120,.95);padding:20px 30px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
.header h1{font-size:28px;margin-bottom:8px;text-shadow:2px 2px 4px rgba(0,0,0,.5)}
.header .info{font-size:14px;opacity:.85}

.summary{display:flex;justify-content:center;gap:12px;padding:15px 20px;flex-wrap:wrap}
.summary-card{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:12px;padding:12px 20px;text-align:center;border:1px solid rgba(255,255,255,.2);cursor:pointer;transition:all .25s;min-width:140px}
.summary-card:hover,.summary-card.active{background:rgba(47,117,181,.6);transform:translateY(-3px);box-shadow:0 8px 25px rgba(47,117,181,.4)}
.summary-card .asama-name{font-size:13px;font-weight:bold;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.summary-card .asama-count{font-size:26px;font-weight:bold;color:#FFD700}
.summary-card .asama-kg{font-size:12px;opacity:.85}

.group-mode-bar,.view-mode-bar{display:flex;justify-content:center;gap:6px;padding:6px 20px;flex-wrap:wrap}
.group-mode-btn,.view-mode-btn{padding:8px 20px;border-radius:25px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-size:13px;font-weight:bold;cursor:pointer;transition:all .25s}
.group-mode-btn:hover,.view-mode-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.group-mode-btn.active{background:rgba(255,152,0,.5);border-color:#FFB74D;color:#FFD700;box-shadow:0 4px 16px rgba(255,152,0,.3)}
.group-mode-btn.gm-hedef.active{background:rgba(47,117,181,.6);border-color:#64B5F6;color:#FFD700}
.view-mode-btn.active{background:rgba(47,117,181,.6);border-color:#FFD700;color:#FFD700}

.filter-bar{display:flex;justify-content:center;gap:8px;padding:8px 20px;flex-wrap:wrap;align-items:center}
.filter-bar input{padding:10px 20px;border-radius:25px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:white;font-size:15px;width:300px;outline:none}
.filter-bar input::placeholder{color:rgba(255,255,255,.5)}
.filter-bar input:focus{border-color:#FFD700}
.filter-bar button{padding:9px 16px;border-radius:25px;border:none;cursor:pointer;font-size:13px;font-weight:bold;transition:all .25s}
.btn-all{background:#2F75B5;color:white}
.btn-kritik{background:#FF4444;color:white}
.btn-uyari{background:#FFC300;color:#222}
.btn-normal{background:#4CAF50;color:white}
.btn-note-list{background:#00A8CC;color:white}
.btn-fire-list{background:#8E44AD;color:white}
.btn-alarm-list{background:#E74C3C;color:white}
.btn-star-list{background:#FF9800;color:white}
.btn-all-export{background:#263238;color:white}
.btn-fire-export{background:#FFD700;color:#222}
.btn-numpad{background:#E91E63;color:white;box-shadow:0 4px 10px rgba(233,30,99,.4)}
.btn-voice{background:#9C27B0;color:white;box-shadow:0 4px 10px rgba(156,39,176,.4)}

.total-bar{text-align:center;padding:12px;font-size:17px;background:rgba(255,255,255,.05)}
.total-bar span{color:#FFD700;font-weight:bold;font-size:20px}

.star-btn{cursor:pointer;font-size:20px;margin-right:5px;opacity:.4;transition:.2s}
.star-btn:hover{opacity:1;transform:scale(1.2)}
.star-btn.active{opacity:1;color:#FFD700;text-shadow:0 0 8px rgba(255,215,0,.6)}

.alarm-btn{cursor:pointer;font-size:18px;margin-left:5px;opacity:.5;transition:.2s}
.alarm-btn:hover{opacity:1;transform:scale(1.2)}
.alarm-btn.active{opacity:1;color:#E74C3C;text-shadow:0 0 8px rgba(231,76,60,.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

.alarm-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(231,76,60,.2);border:1px solid rgba(231,76,60,.5);color:#E74C3C;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:bold}

.panel{position:fixed;right:16px;top:90px;width:min(600px,calc(100vw - 32px));max-height:75vh;overflow:auto;display:none;z-index:9999;padding:14px;border-radius:16px;background:rgba(15,12,41,.97);border:1px solid rgba(255,255,255,.18);box-shadow:0 20px 60px rgba(0,0,0,.55)}
.panel h2{font-size:17px;margin-bottom:6px}
.panel-close{position:absolute;right:12px;top:10px;width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;font-size:17px;font-weight:900;background:rgba(255,255,255,.1);color:white}
.panel-close:hover{background:#FF4444}
.panel-summary{opacity:.8;margin-bottom:10px;font-size:13px}

.list-item{padding:10px;margin-bottom:8px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:12px}
.list-item b{color:#FFD700}
.list-item small{opacity:.7}
.list-empty,.no-results{text-align:center;padding:30px;font-size:17px;opacity:.6}

.alarm-item{background:rgba(255,255,255,.05);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid}
.alarm-item.kritik{border-left-color:#E74C3C;background:rgba(231,76,60,.1)}
.alarm-item.yuksek{border-left-color:#E67E22}
.alarm-item.orta{border-left-color:#F39C12}
.alarm-item.dusuk{border-left-color:#3498DB}
.alarm-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.alarm-item-parti{font-weight:bold;color:#FFD700}
.alarm-item-priority{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:bold}
.alarm-item-priority.kritik{background:#E74C3C;color:white}
.alarm-item-priority.yuksek{background:#E67E22;color:white}
.alarm-item-priority.orta{background:#F39C12;color:black}
.alarm-item-priority.dusuk{background:#3498DB;color:white}
.alarm-item-content{font-size:12px;color:#ccc;margin-bottom:5px}
.alarm-item-time{font-size:11px;color:#888}
.alarm-item-actions{margin-top:8px;display:flex;gap:8px}
.alarm-item-actions button{padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:bold}
.btn-delete-alarm{background:#E74C3C;color:white}
.btn-toggle-alarm{background:#3498DB;color:white}

.priority-btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.priority-btn{padding:8px 16px;border-radius:20px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);cursor:pointer;font-weight:bold;font-size:12px;transition:all .2s}
.priority-btn:hover{background:rgba(255,255,255,.1)}
.priority-btn.active{border-color:currentColor}
.priority-btn.kritik{color:#E74C3C}.priority-btn.kritik.active{background:rgba(231,76,60,.3)}
.priority-btn.yuksek{color:#E67E22}.priority-btn.yuksek.active{background:rgba(230,126,34,.3)}
.priority-btn.orta{color:#F39C12}.priority-btn.orta.active{background:rgba(243,156,18,.3)}
.priority-btn.dusuk{color:#3498DB}.priority-btn.dusuk.active{background:rgba(52,152,219,.3)}

.datetime-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}

.group-header{width:100%;padding:14px 24px;margin:8px 0 4px;background:rgba(47,117,181,.35);border-radius:12px;border-left:5px solid #64B5F6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.group-header.gh-next{background:rgba(255,152,0,.2);border-left-color:#FFB74D}
.group-header .gh-name{font-size:18px;font-weight:bold}
.group-header .gh-stats{font-size:13px;color:#FFD700}

.cards-container{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;padding:16px 24px;max-width:1800px;margin:0 auto}

.flash-card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:14px;width:350px;border:2px solid rgba(255,255,255,.15);transition:all .25s;overflow:hidden;cursor:pointer;position:relative}
.flash-card:hover{transform:translateY(-5px);box-shadow:0 16px 32px rgba(0,0,0,.35);border-color:rgba(255,215,0,.5)}
.flash-card.kritik{border-left:6px solid #FF4444}
.flash-card.uyari{border-left:6px solid #FFC300}
.flash-card.normal{border-left:6px solid #4CAF50}
.flash-card.is-checked{opacity:.4;filter:grayscale(100%)}
.flash-card.has-alarm::after{content:'';position:absolute;top:10px;right:10px;width:10px;height:10px;border-radius:50%;background:#E74C3C;animation:pulse 2s infinite}

.card-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.card-header .parti{font-size:22px;font-weight:bold;color:#FFD700}
.card-header .kilo{font-size:20px;font-weight:bold;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:8px}
.card-header .kilo span{font-size:11px;opacity:.7}

.card-body{padding:0 18px 10px}
.asama-badge{display:inline-block;background:rgba(255,255,255,.12);color:#81D4FA;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:bold;margin-bottom:6px;border:1px solid rgba(129,212,250,.25)}
.next-asama-badge{display:inline-block;background:rgba(255,152,0,.18);color:#FFB74D;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:bold;border:1px solid rgba(255,152,0,.3);margin-left:5px}
.next-asama-badge::before{content:"→ "}
.card-body .line1{font-size:14px;font-weight:700;color:#E0E0E0;margin-bottom:3px}
.card-body .line2{font-size:12px;color:#90CAF9}

.pipeline{display:flex;flex-wrap:wrap;gap:2px;margin-top:5px;align-items:center}
.pipeline-step{font-size:9px;padding:2px 5px;border-radius:3px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.06)}
.pipeline-step.done{background:rgba(76,175,80,.18);color:#81C784;border-color:rgba(76,175,80,.25);text-decoration:line-through}
.pipeline-step.current{background:rgba(47,117,181,.35);color:#64B5F6;border-color:rgba(47,117,181,.45);font-weight:bold}
.pipeline-step.next{background:rgba(255,152,0,.18);color:#FFB74D;border-color:rgba(255,152,0,.25);font-weight:bold}
.pipeline-step.future{background:rgba(255,255,255,.04);color:rgba(255,255,255,.3)}
.pipeline-arrow{color:rgba(255,255,255,.2);font-size:9px}

.card-footer{padding:10px 18px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,.08)}
.card-footer .bekleme{font-size:15px;font-weight:bold}
.card-footer .bekleme.kritik{color:#FF4444}
.card-footer .bekleme.uyari{color:#FFC300}
.card-footer .bekleme.normal{color:#4CAF50}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:bold}
.badge.kritik{background:#FF4444;color:white}
.badge.uyari{background:#FFC300;color:#222}
.badge.normal{background:#4CAF50;color:white}

.flash-card.flipped .card-body{display:none}
.flash-card.flipped .card-detail{display:block}
.card-detail{display:none;padding:10px 18px 14px;font-size:12px;color:#B0BEC5;line-height:1.5}
.det-row{display:flex;justify-content:space-between;gap:8px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.det-label{color:#90CAF9;font-weight:700}

.note-form,.fire-form,.alarm-card-form{margin-top:8px;padding:8px;border-radius:8px}
.note-form{background:rgba(47,117,181,.1);border:1px solid rgba(129,212,250,.3)}
.fire-form{background:rgba(255,112,67,.08);border:1px solid rgba(255,120,120,.3)}
.alarm-card-form{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3)}
.note-form-title{color:#90CAF9;font-weight:800;margin-bottom:6px;font-size:12px}
.fire-form-title{color:#FFB3B3;font-weight:800;margin-bottom:6px;font-size:12px}
.alarm-form-title{color:#E74C3C;font-weight:800;margin-bottom:6px;font-size:12px}
.note-textarea,.fire-input,.fire-select,.fire-textarea,.alarm-input,.alarm-select,.alarm-textarea{width:100%;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.25);color:white;padding:7px;font-size:12px;outline:none;font-family:inherit}
.fire-select option,.alarm-select option{color:#111}
.note-textarea{min-height:50px;resize:vertical}
.note-textarea:focus,.fire-input:focus,.fire-select:focus,.fire-textarea:focus,.alarm-input:focus{border-color:#FFD700}
.note-actions,.fire-actions,.alarm-actions{display:flex;gap:6px;margin-top:6px}
.note-actions button,.fire-actions button,.alarm-actions button{padding:7px 12px;border-radius:18px;border:none;cursor:pointer;font-weight:800;flex:1;font-size:12px}
.btn-save-note{background:#2F75B5;color:white}
.btn-clear-note{background:#455A64;color:white}
.btn-save-fire{background:#FF7043;color:white}
.btn-clear-fire{background:#455A64;color:white}
.btn-save-alarm{background:#E74C3C;color:white}
.note-pill,.fire-pill,.alarm-pill{display:inline-block;margin-top:5px;padding:3px 7px;border-radius:999px;font-size:11px;font-weight:800}
.note-pill{background:rgba(47,117,181,.25);color:#BFEAFF}
.fire-pill{background:rgba(255,112,67,.2);color:#FFD1C2}
.alarm-pill{background:rgba(231,76,60,.2);color:#FFB3B3}

.fire-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fire-grid .full{grid-column:1/-1}
.fire-mini-list{margin-bottom:8px;display:flex;flex-direction:column;gap:4px}
.fire-mini-item{background:rgba(255,112,67,.1);border:1px solid rgba(255,112,67,.3);border-radius:6px;padding:5px;font-size:11px;color:#FFD6CC}
.fire-mini-item button{margin-top:4px;border:none;border-radius:5px;padding:3px 7px;background:#B71C1C;color:white;cursor:pointer;font-weight:800;font-size:10px}

.mini-cards-container{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:16px 24px;max-width:1800px;margin:0 auto}
.mini-card{background:rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;width:240px;border:2px solid rgba(255,255,255,.1);transition:all .2s;cursor:pointer;position:relative}
.mini-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.3);border-color:rgba(255,215,0,.35)}
.mini-card.kritik{border-left:5px solid #FF4444}
.mini-card.uyari{border-left:5px solid #FFC300}
.mini-card.normal{border-left:5px solid #4CAF50}
.mini-card.is-checked{opacity:.4;filter:grayscale(100%)}
.mini-card .mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.mini-card .mc-parti{font-size:15px;font-weight:bold;color:#FFD700}
.mini-card .mc-kilo{font-size:14px;font-weight:bold;background:rgba(255,255,255,.1);padding:2px 7px;border-radius:5px}
.mini-card .mc-kilo small{font-size:9px;opacity:.7}
.mini-card .mc-asama{font-size:10px;color:#81D4FA;background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;display:inline-block}
.mini-card .mc-line1{font-size:11px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-card .mc-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding-top:4px;border-top:1px solid rgba(255,255,255,.06)}
.mini-card .mc-bekleme{font-size:11px;font-weight:bold}
.mini-card .mc-bekleme.kritik{color:#FF4444}
.mini-card .mc-bekleme.uyari{color:#FFC300}
.mini-card .mc-bekleme.normal{color:#4CAF50}
.mini-card .mc-badge{font-size:8px;padding:2px 6px;border-radius:8px;font-weight:bold}
.mini-card .mc-badge.kritik{background:#FF4444;color:white}
.mini-card .mc-badge.uyari{background:#FFC300;color:#222}
.mini-card .mc-badge.normal{background:#4CAF50;color:white}

.list-view-container{padding:16px 24px;max-width:1800px;margin:0 auto}
.list-view-table{width:100%;border-collapse:collapse;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}
.list-view-table thead th{background:rgba(47,117,181,.6);color:white;padding:10px 8px;font-size:12px;font-weight:bold;text-align:left;border-bottom:2px solid rgba(255,255,255,.12);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
.list-view-table thead th:hover{background:rgba(47,117,181,.85)}
.list-view-table tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
.list-view-table tbody tr:hover{background:rgba(255,255,255,.06)}
.list-view-table tbody tr.is-checked{opacity:.35;filter:grayscale(100%)}
.list-view-table tbody tr.group-sep td{background:rgba(47,117,181,.15);padding:8px 10px;font-weight:bold;font-size:14px;color:#64B5F6;border-top:2px solid rgba(47,117,181,.4)}
.list-view-table tbody tr.group-sep.gs-next td{background:rgba(255,152,0,.1);color:#FFB74D;border-top-color:rgba(255,152,0,.3)}
.list-view-table tbody td{padding:8px;font-size:12px;vertical-align:middle}
.lv-parti{font-weight:bold;color:#FFD700;font-size:14px}
.lv-asama{color:#81D4FA;font-size:11px}
.lv-next{color:#FFB74D;font-size:11px}
.lv-kilo{font-weight:bold;text-align:right;font-size:13px}
.lv-bekleme{font-weight:bold;font-size:12px}
.lv-bekleme.kritik{color:#FF4444}
.lv-bekleme.uyari{color:#FFC300}
.lv-bekleme.normal{color:#4CAF50}
.lv-line1{color:#ccc;font-size:11px;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lv-seviye-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.lv-seviye-dot.kritik{background:#FF4444}
.lv-seviye-dot.uyari{background:#FFC300}
.lv-seviye-dot.normal{background:#4CAF50}

.kanban-container{display:flex;gap:14px;padding:16px;overflow-x:auto;align-items:flex-start;min-height:60vh}
.kanban-column{min-width:280px;max-width:320px;flex:1 0 280px;background:rgba(255,255,255,.05);border-radius:12px;border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;max-height:80vh}
.kanban-col-header{padding:12px 14px;border-radius:12px 12px 0 0;text-align:center;position:sticky;top:0;z-index:2}
.kanban-col-header.kch-hedef{background:rgba(47,117,181,.45)}
.kanban-col-header.kch-next{background:rgba(255,152,0,.35)}
.kanban-col-header .kch-name{font-size:15px;font-weight:bold;color:white}
.kanban-col-header .kch-stats{font-size:11px;color:#FFD700;margin-top:2px}
.kanban-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.kanban-card{background:rgba(255,255,255,.07);border-radius:8px;padding:8px 10px;border:1px solid rgba(255,255,255,.08);transition:all .2s;cursor:pointer}
.kanban-card:hover{background:rgba(255,255,255,.12);border-color:rgba(255,215,0,.25);transform:translateY(-2px)}
.kanban-card.kritik{border-left:4px solid #FF4444}
.kanban-card.uyari{border-left:4px solid #FFC300}
.kanban-card.normal{border-left:4px solid #4CAF50}
.kanban-card.is-checked{opacity:.3;filter:grayscale(100%)}
.kanban-card .kc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.kanban-card .kc-parti{font-size:13px;font-weight:bold;color:#FFD700}
.kanban-card .kc-kilo{font-size:12px;font-weight:bold}
.kanban-card .kc-line1{font-size:10px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kanban-card .kc-sub{font-size:9px;color:#aaa;margin-top:2px}
.kanban-card .kc-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding-top:3px;border-top:1px solid rgba(255,255,255,.05)}
.kanban-card .kc-bekleme{font-size:10px;font-weight:bold}
.kanban-card .kc-bekleme.kritik{color:#FF4444}
.kanban-card .kc-bekleme.uyari{color:#FFC300}
.kanban-card .kc-bekleme.normal{color:#4CAF50}
.kanban-card .kc-badge{font-size:8px;padding:2px 5px;border-radius:6px;font-weight:bold}
.kanban-card .kc-badge.kritik{background:#FF4444;color:white}
.kanban-card .kc-badge.uyari{background:#FFC300;color:#222}
.kanban-card .kc-badge.normal{background:#4CAF50;color:white}

<script>
// ==========================================
// FAIL-SAFE INITIALIZATION & PARSING LOGIC
// ==========================================
function safeParse(key, def) {
    try {
        const val = localStorage.getItem(key);
        return val ? JSON.parse(val) : JSON.parse(def);
    } catch(e) {
        console.warn("Storage Hatası ("+key+"), temizlendi.");
        return JSON.parse(def);
    }
}

function safeSet(key) {
    try {
        const arr = JSON.parse(localStorage.getItem(key));
        if (Array.isArray(arr)) return new Set(arr);
    } catch(e) {
        console.warn("Set Hatası ("+key+"), temizlendi.");
    }
    return new Set();
}

let DATA={},ASAMA_ORDER=[],BSA_ORDER=[];
async function loadData(){try{const r=await fetch('parti_veri.json');const j=await r.json();DATA=j.DATA||{};ASAMA_ORDER=j.ASAMA_ORDER||[];BSA_ORDER=j.BSA_ORDER||[];init()}catch(e){setTimeout(loadData,2000)}}loadData();
const FIRE_REASONS=['Leke','Yırtık','Renk Farkı','Dokuma Hatası','Boya Hatası','Kesim Firesi','Metraj Eksikliği','Numune Firesi','Test Firesi','Kenar Firesi','Dikiş/Birleşim Hatası','Diğer'];
const DURUM_KAT=['Acil','Öncelikli','Beklemede','Sorunlu','Tamamlandı','Müşteri Bekleniyor','Üretim Hatası'];
const ALARM_PRIORITIES=['Kritik','Yüksek','Orta','Düşük'];

let currentSeviye=null,currentGroupMode='hedef';
let currentViewMode = localStorage.getItem('vm9');
if(!['cards','mini','list','kanban'].includes(currentViewMode)) currentViewMode = 'cards';

let currentDisplayedCards=[],listSortCol=null,listSortAsc=true,activeStages=[];
const checkedCards=safeSet('ck9');
let fireRecords=safeParse('fr9','{}');
let noteRecords=safeParse('nr9','{}');
let alarmRecords=safeParse('ar9','{}');
let selectedRecords=safeParse('sr9','{}');

function saveChecks(){localStorage.setItem('ck9',JSON.stringify([...checkedCards]))}
function saveNotes(){localStorage.setItem('nr9',JSON.stringify(noteRecords))}
function saveFires(){localStorage.setItem('fr9',JSON.stringify(fireRecords))}
function saveAlarms(){localStorage.setItem('ar9',JSON.stringify(alarmRecords))}
function saveSelected(){localStorage.setItem('sr9',JSON.stringify(selectedRecords))}
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function xmlEsc(v){return esc(v)}
function num(v){return parseFloat(String(v??'0').replace(',','.'))||0}
function showToast(m,t='success'){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}

/* ── GELİŞTİRİLMİŞ TÜRKÇE SES MOTORU (TTS) ── */
let trVoiceCached = null;

function loadTurkishVoice() {
    if (!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices();
    if (!voices || voices.length === 0) return null;

    // Doğal sesleri filtrele
    let voice = voices.find(v => v.lang === 'tr-TR' && (v.name.includes('Google') || v.name.includes('Natural') || v.name.includes('Premium')));
    if (!voice) {
        voice = voices.find(v => v.lang === 'tr-TR');
    }
    if (!voice) {
        voice = voices.find(v => v.lang.startsWith('tr'));
    }

    if (voice) {
        trVoiceCached = voice;
    }
    return voice;
}

if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = function() {
        loadTurkishVoice();
    };
    loadTurkishVoice();
}

function speakText(text) {
    if (!('speechSynthesis' in window)) return;

    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'tr-TR';
    u.rate = 0.9;
    u.pitch = 1.0;

    const voice = trVoiceCached || loadTurkishVoice();

    if (voice && voice.lang.startsWith('tr')) {
        u.voice = voice;
        window.speechSynthesis.speak(u);
    } else {
        // Cihazda tanımlı Türkçe ses motoru yoksa İngilizce aksanı engellemek için voice değerini temizle
        u.voice = null;
        window.speechSynthesis.speak(u);
    }
}

// --- Polling: veri.json'dan güncellemeleri kontrol et ---
let pollTimer = null;
const POLL_INTERVAL = 30000;

function hashData(data) {
    let total = 0, count = 0;
    for (const a in data) {
        if (!data[a] || !data[a].kartlar) continue;
        count += data[a].kartlar.length;
        data[a].kartlar.forEach(k => total += k.kilo || 0);
    }
    return count + '_' + total.toFixed(0);
}

let lastDataHash = '';

async function pollForUpdates() {
    try {
        const r = await fetch('parti_veri.json?_=' + Date.now(), { cache: 'no-cache' });
        const json = await r.json();
        if (!json.DATA) return;
        const h = hashData(json.DATA);
        if (h !== lastDataHash) {
            lastDataHash = h;
            // Verileri güncelle
            Object.keys(DATA).forEach(k => delete DATA[k]);
            Object.assign(DATA, json.DATA);
            ASAMA_ORDER.length = 0; ASAMA_ORDER.push(...json.ASAMA_ORDER);
            BSA_ORDER.length = 0; BSA_ORDER.push(...json.BSA_ORDER);
            // ID'leri yeniden ata
            let c = 0;
            for (const a in DATA) {
                if (DATA[a] && DATA[a].kartlar) {
                    DATA[a].kartlar.forEach(k => { k.id = 'c_' + (c++); k._asama = a; });
                }
            }
            const searchT = document.getElementById('searchBox').value;
            const cv = currentViewMode, cg = currentGroupMode;
            setGroupMode(cg);
            if (searchT) filterCards();
            setViewMode(cv);
            showToast('📊 Veri güncellendi!', 'warning');
        }
    } catch(e) {}
}

function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    lastDataHash = hashData(DATA);
    pollTimer = setInterval(pollForUpdates, POLL_INTERVAL);
}

function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

document.addEventListener('visibilitychange', () => {
    document.hidden ? stopPolling() : startPolling();
});

function init(){
    let c=0;for(const a in DATA)DATA[a].kartlar.forEach(k=>{k.id='c_'+(c++);k._asama=a});
    checkAlarms();setGroupMode(currentGroupMode);setViewMode(currentViewMode);showAll();updateStarCount();updateAlarmCount();
    startPolling();
}

function getAllCards(){let a=[];for(const x of ASAMA_ORDER)if(DATA[x])DATA[x].kartlar.forEach(k=>a.push(k));return a}
function getCardById(id){return getAllCards().find(k=>k.id===id)}
function getFireList(id){const r=fireRecords[id];if(!r)return[];return Array.isArray(r)?r:[r]}
function getAlarmsList(id){const r=alarmRecords[id];if(!r)return[];return Array.isArray(r)?r:[r]}

/* ── ALARM SİSTEMİ ── */
function checkAlarms(){
    const now=new Date();
    Object.keys(alarmRecords||{}).forEach(id=>{getAlarmsList(id).forEach(a=>{if(a.active&&a.datetime){if(now>=new Date(a.datetime))showToast('🔔 ALARM: '+a.parti+' - '+a.title,'warning')}})});
    setTimeout(checkAlarms,60000);
}
function updateAlarmCount(){let c=0;Object.keys(alarmRecords||{}).forEach(id=>{c+=getAlarmsList(id).filter(a=>a.active!==false).length});const b=document.querySelector('.btn-alarm-list');if(b)b.innerHTML='🔔 Alarm'+(c?' ('+c+')':'')}

function toggleAlarmPanel(){closeAllPanels();const p=document.getElementById('alarmPanel');if(p.style.display==='block')p.style.display='none';else renderAlarmPanel()}
function renderAlarmPanel(){
    const p=document.getElementById('alarmPanel');const all=[];
    Object.keys(alarmRecords).forEach(id=>{getAlarmsList(id).forEach((a,i)=>{all.push({...a,id,alarm_index:i})})});
    let h='<button class="panel-close" onclick="document.getElementById(\\'alarmPanel\\').style.display=\\'none\\'">×</button><h2 style="color:#E74C3C">🔔 Alarmlar</h2><div class="panel-summary">'+all.length+' alarm</div>';
    if(!all.length)h+='<div class="list-empty">Alarm yok</div>';
    else{const active=all.filter(a=>a.active!==false),inactive=all.filter(a=>a.active===false);
    if(active.length){h+='<h4 style="color:#4CAF50;margin:10px 0">🟢 Aktif</h4>';active.forEach(a=>{const pc=a.priority?.toLowerCase()||'dusuk';const dt=a.datetime?new Date(a.datetime).toLocaleString('tr-TR'):'';h+='<div class="alarm-item '+pc+'"><div class="alarm-item-header"><span class="alarm-item-parti">'+esc(a.parti)+'</span><span class="alarm-item-priority '+pc+'">'+esc(a.priority||'Orta')+'</span></div><div class="alarm-item-content"><b>'+esc(a.title)+'</b><br>'+esc(a.description||'')+'</div><div class="alarm-item-time">📅 '+dt+'</div><div class="alarm-item-actions"><button class="btn-toggle-alarm" onclick="toggleAlarmActive(\\''+a.id+'\\',\\''+a.uid+'\\')">⏸️</button><button class="btn-delete-alarm" onclick="deleteAlarm(\\''+a.id+'\\',\\''+a.uid+'\\')">🗑️</button></div></div>'})}
    if(inactive.length){h+='<h4 style="color:#888;margin:10px 0">⚫ Pasif</h4>';inactive.forEach(a=>{const pc=a.priority?.toLowerCase()||'dusuk';h+='<div class="alarm-item '+pc+'" style="opacity:.5"><div class="alarm-item-header"><span class="alarm-item-parti">'+esc(a.parti)+'</span><span class="alarm-item-priority '+pc+'">'+esc(a.priority||'')+'</span></div><div class="alarm-item-content"><b>'+esc(a.title)+'</b></div><div class="alarm-item-actions"><button class="btn-toggle-alarm" onclick="toggleAlarmActive(\\''+a.id+'\\',\\''+a.uid+'\\')">▶️</button><button class="btn-delete-alarm" onclick="deleteAlarm(\\''+a.id+'\\',\\''+a.uid+'\\')">🗑️</button></div></div>'})}}
    p.innerHTML=h;p.style.display='block';
}
function openAlarmModal(id){
    const k=getCardById(id);if(!k)return;
    const prioOpts=ALARM_PRIORITIES.map(p=>'<button class="priority-btn '+p.toLowerCase()+'" data-priority="'+p+'" onclick="selectPriority(this)">'+p+'</button>').join('');
    let existing='';const alarms=getAlarmsList(id);

/* ── KESİNTİSİZ SESLİ PARTİ EKLEME MANTIĞI ── */
function addManualToSelection(disaridanPartiNo) {
    let pNo = "";
    if (typeof disaridanPartiNo === "string" || typeof disaridanPartiNo === "number") {
        pNo = String(disaridanPartiNo);
    }
    const input = document.getElementById('manualStarInput');
    const partiNo = pNo.trim() || (input ? input.value.trim() : '');
    if (!partiNo) return;

    const allCards = getAllCards();
    const cleanTarget = partiNo.replace(/[^a-zA-Z0-9_-]/g, '').toLowerCase();

    let card = allCards.find(c => String(c.parti).replace(/[^a-zA-Z0-9_-]/g, '').toLowerCase() === cleanTarget);
    if(!card) {
        const partials = allCards.filter(c => String(c.parti).toLowerCase().includes(cleanTarget));
        if(partials.length === 1) card = partials[0];
    }

    if (card) {
        if (!selectedRecords[card.id]) {
            const al = getAlarmsList(card.id);
            selectedRecords[card.id] = {id: card.id, parti: card.parti, asama: card._asama, bir_sonraki: card.bir_sonraki||'', firma: card.line1||'', ham_adi: card.ham_adi||'', recete_adi: card.recete_adi||'', kilo: card.kilo, bekleme: card.bekleme||'', durum: '', not: '', alarm_info: al.filter(a=>a.active!==false).map(a=>a.title).join(', '), added_at: new Date().toLocaleString('tr-TR')};
            saveSelected();
            document.querySelectorAll('.star-'+card.id).forEach(el=>{el.classList.add('active');el.innerHTML='🌟'});
            updateStarCount();
            if(document.getElementById('selectionPanel').style.display==='block') renderSelectionPanel();
            showToast('✅ Listeye eklendi: ' + card.parti);
        } else {
            showToast('⚠️ Zaten listede: ' + card.parti, 'warning');
        }
    } else {
        showToast('❌ Parti bulunamadı: ' + partiNo, 'error');
    }

    if (pNo === "" && input) input.value = '';
}

let yildizliSesTanima = null;
function baslatKesintisizYildizSesli() {
    if (!('webkitSpeechRecognition' in window) && !('speechRecognition' in window)) {
        alert("Tarayıcınız ses tanıma özelliğini desteklemiyor.");
        return;
    }

    const btn = document.getElementById('btnYildizSesli');

    if (yildizliSesTanima && btn && btn.classList.contains('dinliyor')) {
        yildizliSesTanima.stop();
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    yildizliSesTanima = new SpeechRecognition();
    yildizliSesTanima.continuous = true;
    yildizliSesTanima.interimResults = false;
    yildizliSesTanima.lang = 'tr-TR';

    if(btn) {
        btn.style.backgroundColor = '#f44336';
        btn.innerHTML = '🔴 Dinliyor (Kapatmak için tıkla)';
        btn.classList.add('dinliyor');
    }

    yildizliSesTanima.onresult = function(event) {
        const sonIndex = event.results.length - 1;
        const gelenMetin = event.results[sonIndex][0].transcript.trim();
        console.log("Algılanan Ses:", gelenMetin);

        const bulunanPartiler = gelenMetin.replace(/ ve /gi, ' ').replace(/,/g, ' ').split(' ').filter(p => p.trim().length > 0);

        bulunanPartiler.forEach(partiNo => {
            addManualToSelection(partiNo);
        });
    };

    yildizliSesTanima.onend = function() {
        if(btn) {
            btn.style.backgroundColor = '#9C27B0';
            btn.innerHTML = '🎙️ Kesintisiz Sesli Ekle';
            btn.classList.remove('dinliyor');
        }
    };

    yildizliSesTanima.onerror = function(event) {
        if(btn) {
            btn.style.backgroundColor = '#9C27B0';
            btn.innerHTML = '🎙️ Kesintisiz Sesli Ekle';
            btn.classList.remove('dinliyor');
        }
    };

    yildizliSesTanima.start();
}

/* ── SESLİ NOT YAZMA ── */
function startVoiceNote(id) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Tarayıcınız sesli komutu desteklemiyor.'); return; }
    const r = new SR(); r.lang = 'tr-TR'; r.interimResults = false;
    const btn = document.getElementById('btn_mic_' + id);
    if(btn) btn.innerHTML = '🔴';
    r.start();
    r.onresult = function(e) {
        const text = e.results[0][0].transcript;
        const input = document.getElementById('sel_not_' + id);
        if(input) {
            input.value = (input.value + ' ' + text).trim();
            updateSelItem(id, 'not', input.value);
        }
        if(btn) btn.innerHTML = '🎤';
        showToast('📝 Sesli not eklendi!');
    };
    r.onerror = function() { if(btn) btn.innerHTML = '🎤'; showToast('Not anlaşılamadı', 'error');};
    r.onend = function() { if(btn) btn.innerHTML = '🎤'; };
}

let origDOM={};
function prepareForExport(){
    const w=document.getElementById('pdfWrapper'),c=document.getElementById('selectionListContainer'),p=document.getElementById('selectionPanel');
    origDOM.scrollY=window.scrollY; window.scrollTo(0,0);
    origDOM.cOX=c.style.overflowX;origDOM.cOY=c.style.overflowY;origDOM.cMH=c.style.maxHeight;
    origDOM.pOX=p.style.overflowX;origDOM.pOY=p.style.overflowY;origDOM.pMH=p.style.maxHeight;origDOM.pPos=p.style.position;origDOM.pTop=p.style.top;
    origDOM.pWidth=p.style.width;origDOM.pMaxWidth=p.style.maxWidth;origDOM.wWidth=w.style.width;

    c.style.overflowX='visible';c.style.overflowY='visible';c.style.maxHeight='none';
    p.style.position='absolute';p.style.top='0px';p.style.overflowX='visible';p.style.overflowY='visible';p.style.maxHeight='none';
    p.style.width='max-content';p.style.maxWidth='none';w.style.width='max-content';

    origDOM.islem=[];w.querySelectorAll('.islem-col').forEach(el=>{origDOM.islem.push({el,d:el.style.display});el.style.display='none'});
    origDOM.selRep=[];w.querySelectorAll('select.sel-select.snapshot-hide').forEach(sel=>{const idx=sel.selectedIndex;let val=(idx>=0)?sel.options[idx].text:'-';if(val==='-- Durum --')val='-';const sp=document.createElement('div');sp.textContent=val;sp.style.fontWeight='bold';sp.style.color=val==='-'?'#777':'#E74C3C';sp.style.marginBottom='4px';sel.parentNode.insertBefore(sp,sel);sel.style.display='none';origDOM.selRep.push({sel,sp})});
    origDOM.inpRep=[];w.querySelectorAll('input.sel-input.snapshot-hide').forEach(inp=>{const sp=document.createElement('div');sp.textContent=inp.value||'-';sp.style.color='#ccc';sp.style.wordBreak='break-word';sp.style.maxWidth='180px';inp.parentNode.insertBefore(sp,inp);inp.style.display='none';origDOM.inpRep.push({inp,sp})});
    origDOM.micRep=[];w.querySelectorAll('button.snapshot-hide').forEach(btn=>{origDOM.micRep.push({btn,d:btn.style.display});btn.style.display='none'});
    return w;
}
function restoreAfterExport(){
    const w=document.getElementById('pdfWrapper'),c=document.getElementById('selectionListContainer'),p=document.getElementById('selectionPanel');
    c.style.overflowX=origDOM.cOX;c.style.overflowY=origDOM.cOY;c.style.maxHeight=origDOM.cMH;
    if(origDOM.pPos!==undefined){
        p.style.position=origDOM.pPos;p.style.top=origDOM.pTop;p.style.overflowX=origDOM.pOX;p.style.overflowY=origDOM.pOY;p.style.maxHeight=origDOM.pMH;
        p.style.width=origDOM.pWidth;p.style.maxWidth=origDOM.pMaxWidth;w.style.width=origDOM.wWidth;
    }
    if(origDOM.islem)origDOM.islem.forEach(i=>{i.el.style.display=i.d});
    if(origDOM.selRep)origDOM.selRep.forEach(i=>{i.sp.remove();i.sel.style.display=''});
    if(origDOM.inpRep)origDOM.inpRep.forEach(i=>{i.sp.remove();i.inp.style.display=''});
    if(origDOM.micRep)origDOM.micRep.forEach(i=>{i.btn.style.display=i.d});
    if(origDOM.scrollY!==undefined)window.scrollTo(0,origDOM.scrollY);
}

async function shareWhatsApp(){

    try{

        restoreAfterExport();

            const file=new File([blob],'secimler.png',{type:'image/png'});

                try{await navigator.share({files:[file],title:'Seçimler',text:'Özel Seçimler Listesi'});showToast('✅ Paylaşıldı!')}
                catch(e){fallbackDownload(blob)}
            }else fallbackDownload(blob);

function startVoiceSearch(){

/* ── GROUP / VIEW / FILTER ── */
function closeAllPanels(){['notePanel','firePanel','alarmPanel','selectionPanel'].forEach(id=>document.getElementById(id).style.display='none')}
function setGroupMode(m){currentGroupMode=m;activeStages=[];document.querySelectorAll('.group-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.gmode===m));renderSummaries();renderCards(getFilteredCards())}
function getGroupKey(k){return currentGroupMode==='next'?(k.bir_sonraki||'(Son Aşama)'):k._asama}
function getGroupOrder(){if(currentGroupMode==='next'){const seen=[];BSA_ORDER.forEach(a=>{if(!seen.includes(a))seen.push(a)});getAllCards().forEach(k=>{const gk=k.bir_sonraki||'(Son Aşama)';if(!seen.includes(gk))seen.push(gk)});return seen}return ASAMA_ORDER}

function toggleAsamaFromSummary(a){if(activeStages.length===1&&activeStages[0]===a)activeStages=[];else activeStages=[a];document.getElementById('searchBox').value='';listSortCol=null;renderSummaries();filterCards()}
function renderSummaries(){const bar=document.getElementById('summaryBar');const order=getGroupOrder();const stats={};let allC=0,allK=0;order.forEach(a=>stats[a]={count:0,kg:0});getAllCards().forEach(k=>{if(checkedCards.has(k.id))return;const gk=getGroupKey(k);allC++;allK+=k.kilo;if(!stats[gk])stats[gk]={count:0,kg:0};stats[gk].count++;stats[gk].kg+=k.kilo});let h='<div class="summary-card '+(activeStages.length===0?'active':'')+'" onclick="showAll()"><div class="asama-name">TÜMÜ</div><div class="asama-count">'+allC+'</div><div class="asama-kg">'+Math.round(allK).toLocaleString('tr-TR')+' kg</div></div>';order.forEach(a=>{const s=stats[a];if(!s||s.count===0)return;h+='<div class="summary-card '+(activeStages.includes(a)?'active':'')+'" onclick="toggleAsamaFromSummary(\\''+esc(a)+'\\')"><div class="asama-name">'+esc(a)+'</div><div class="asama-count">'+s.count+'</div><div class="asama-kg">'+Math.round(s.kg).toLocaleString('tr-TR')+' kg</div></div>';});bar.innerHTML=h}

function toggleCheck(e,id){e.stopPropagation();checkedCards.has(id)?checkedCards.delete(id):checkedCards.add(id);saveChecks();renderSummaries();renderCurrentView();recalc()}
function recalc(){let c=0,kg=0;currentDisplayedCards.forEach(k=>{if(!checkedCards.has(k.id)){c++;kg+=k.kilo}});updateTotal(c,kg)}
function updateTotal(c,kg){document.getElementById('totalBar').innerHTML='Gösterilen: <span>'+c+'</span> parti • <span>'+Math.round(kg).toLocaleString('tr-TR')+'</span> kg'}

function setViewMode(m){
    const map = {cards:'cardsContainer',mini:'miniCardsContainer',list:'listViewContainer',kanban:'kanbanContainer'};
    if(!map[m]) m = 'cards';
    currentViewMode=m;
    localStorage.setItem('vm9',m);
    document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
    ['cardsContainer','miniCardsContainer','listViewContainer','kanbanContainer'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById(map[m]).style.display='';
    renderCurrentView();
}
function renderCurrentView(){
    if(currentViewMode === 'mini') renderMiniView(currentDisplayedCards);
    else if(currentViewMode === 'list') renderListView(currentDisplayedCards);
    else if(currentViewMode === 'kanban') renderKanbanView(currentDisplayedCards);
    else renderCardsView(currentDisplayedCards);
}
function renderCards(k){currentDisplayedCards=k;renderCurrentView();recalc()}
function groupByKey(kartlar){const order=getGroupOrder();const map={};kartlar.forEach(k=>{const gk=getGroupKey(k);if(!map[gk])map[gk]=[];map[gk].push(k)});const r=[];order.forEach(a=>{if(map[a]&&map[a].length)r.push({key:a,cards:map[a]})});Object.keys(map).forEach(a=>{if(!order.includes(a)&&map[a].length)r.push({key:a,cards:map[a]})});return r}

function buildPipeline(k){const ua=k.uretim_asamalari||'';if(!ua)return'';const steps=ua.split(',').map(s=>s.trim()).filter(s=>s);if(steps.length<2)return'';const cn=(k._asama||'').trim().toLowerCase(),nn=(k.bir_sonraki||'').trim().toLowerCase();let ci=-1;for(let i=0;i<steps.length;i++)if(steps[i].trim().toLowerCase()===cn){ci=i;break}let h='<div class="pipeline">';steps.forEach((s,i)=>{let c='future';if(ci>=0){if(i<ci)c='done';else if(i===ci)c='current';else if(s.trim().toLowerCase()===nn&&nn)c='next'}if(i>0)h+='<span class="pipeline-arrow\\">›</span>';h+='<span class="pipeline-step '+c+'">'+esc(s)+'</span>'});return h+'</div>'}

/* ── CARDS VIEW ── */

        let fml='';if(fl.length){fml='<div class="fire-mini-list">';fl.forEach((fr,i)=>{fml+='<div class="fire-mini-item"><b>'+(i+1)+') '+esc(fr.fire_sebebi||'')+'</b> '+num(fr.fire_kg).toLocaleString('tr-TR')+'kg<button onclick="deleteFireLine(event,\\''+k.id+'\\',\\''+fr.uid+'\\')">Sil</button></div>'});fml+='</div>'}
        h+='<div class="flash-card '+sev+' '+(ic?'is-checked':'')+' '+(hasAl?'has-alarm':'')+'" id="card_'+k.id+'" onclick="this.classList.toggle(\\'flipped\\')"><div class="card-header"><div style="display:flex;align-items:center;gap:5px">'+starH+alarmBtnH+'<input type="checkbox" class="parti-checkbox" '+(ic?'checked':'')+' onclick="toggleCheck(event,\\''+k.id+'\\')"><div class="parti" style="margin-left:5px">'+esc(k.parti)+'</div></div><div class="kilo">'+Math.round(k.kilo).toLocaleString('tr-TR')+' <span>kg</span></div></div><div class="card-body"><div class="asama-badge">'+esc(k._asama)+'</div>'+alBadge+nb+'<div class="line1">'+esc(k.line1||'')+'</div><div class="line2">'+esc(k.line2||'')+'</div>'+pipe+np2+fp+'</div><div class="card-detail"><div class="det-row"><span class="det-label">Bekliyor:</span><span>'+esc(k._asama)+'</span></div><div class="det-row"><span class="det-label">Bir Sonraki:</span><span style="color:#FFB74D;font-weight:bold">'+esc(k.bir_sonraki||'Son/Yok')+'</span></div><div class="det-row"><span class="det-label">Üretim Sırası:</span><span style="font-size:10px">'+esc(k.uretim_asamalari||'-')+'</span></div><div class="det-row"><span class="det-label">Firma:</span><span>'+esc(k.line1||'-')+'</span></div><div class="det-row"><span class="det-label">Kumaş:</span><span>'+esc(k.ham_adi||'-')+'</span></div><div class="det-row"><span class="det-label">Reçete:</span><span>'+esc(k.recete_adi||'-')+'</span></div><div class="det-row"><span class="det-label">Bekleme:</span><span>'+esc(bt)+'</span></div><div class="note-form" onclick="event.stopPropagation()"><div class="note-form-title">📝 Not</div><textarea class="note-textarea" id="note_'+k.id+'">'+esc(nv)+'</textarea><div class="note-actions"><button class="btn-save-note" onclick="saveNote(event,\\''+k.id+'\\')">Kaydet</button><button class="btn-clear-note" onclick="clearNote(event,\\''+k.id+'\\')">Sil</button></div></div><div class="fire-form" onclick="event.stopPropagation()"><div class="fire-form-tit function toSheetXml(n,rows){const hd=rows.length?Object.keys(rows[0]):['Bilgi'];const data=rows.length?rows:[{Bilgi:'Yok'}];let x='<Worksheet ss:Name="'+xmlEsc(n).slice(0,31)+'"><Table>';x+='<Row>'+hd.map(h=>'<Cell><Data ss:Type="String">'+xmlEsc(h)+'</Data></Cell>').join('')+'</Row>';data.forEach(r=>{x+='<Row>';hd.forEach(h=>{const v=r[h];const isN=typeof v==='number'&&isFinite(v);x+='<Cell><Data ss:Type="'+(isN?'Number':'String')+'">'+xmlEsc(isN?Number(v.toFixed(4)):v)+'</Data></Cell>'});x+='</Row>';});x+='</Table></Worksheet>';return x}
function downloadWorkbook(fn,sheets){let x='<?xml version="1.0" encoding="UTF-8"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">';sheets.forEach(s=>x+=toSheetXml(s.name,s.rows));x+='</Workbook>';const b=new Blob([x],{type:'application/vnd.ms-excel;charset=utf-8;'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u)}
function exportFireWorkbook(){const rows=[];Object.keys(fireRecords).forEach(id=>{getFireList(id).forEach((f,i)=>{rows.push({'Parti':f.parti,'Aşama':f.asama,'#':i+1,'Sebep':f.fire_sebebi,'Fire Kg':num(f.fire_kg),'Fire Mt':num(f.fire_mt),'Açıklama':f.fire_aciklama||'','Tarih':f.saved_at})})});if(!rows.length){alert('Fire yok');return}downloadWorkbook('fire_'+new Date().toLocaleDateString('tr-TR').replace(/\\\\\\\\./g,'_')+'.xls',[{name:'Fire',rows}])}
function exportAllToExcel(){const rows=getAllCards().map(k=>{const fl=getFireList(k.id);const al=getAlarmsList(k.id);const sel=selectedRecords[k.id];return{'Aşama':k._asama,'Bir Sonraki':k.bir_sonraki||'','Parti':k.parti,'Firma':k.line1||'','Kumaş':k.ham_adi||'','Reçete':k.recete_adi||'','Kilo':num(k.kilo),'Bekleme (gün)':num(k.bekleme_gun),'Durum':sel?sel.durum:'','Not':sel?sel.not:(noteRecords[k.id]?noteRecords[k.id].note:''),'Fire (kg)':fl.reduce((a,b)=>a+num(b.fire_kg),0),'Alarm':al.filter(a=>a.active!==false).map(a=>a.title).join(', '),'Seviye':k.seviye==='kritik'?'KRİTİK':k.seviye==='uyari'?'UYARI':'NORMAL','Seçili':sel?'Evet':'Hayır'}});downloadWorkbook('parti_takip_'+new Date().toLocaleDateString('tr-TR').replace(/\\\\\\\\./g,'')+'.xls',[{name:'Tümü',rows}])}
</script>
